version: '3.8'

services:
  # =====================================
  # DATABASE
  # =====================================
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_DB: access_control_system
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - iot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d access_control_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =====================================
  # MQTT BROKER
  # =====================================
  mqtt-broker:
    image: eclipse-mosquitto:2.0.18
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqttdata:/mosquitto/data
      - mqttlogs:/mosquitto/log
    networks:
      - iot_network

  # =====================================
  # APACHE KAFKA BROKER (KRaft mode)
  # =====================================
  kafka-broker:
    image: apache/kafka:3.7.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - iot_network

  # =====================================
  # MICROSERVICES
  # =====================================
  data-ingestion:
    build: ./data-ingestion
    container_name: data-ingestion
    ports:
      - "8000:8000"
    environment:
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      - MQTT_QOS=${MQTT_QOS:-0}
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092
      - KAFKA_ACKS=${KAFKA_ACKS:-1}
    depends_on:
      mqtt-broker:
        condition: service_started
      kafka-broker:
        condition: service_healthy
    networks:
      - iot_network

  data-storage:
    build: ./data-storage
    container_name: data-storage
    ports:
      - "8001:8001"
    environment:
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      - MQTT_QOS=${MQTT_QOS:-0}
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092
      - DB_HOST=db
      - DB_NAME=access_control_system
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DISABLE_DB_WRITE=${DISABLE_DB_WRITE:-false}
      - BATCH_SIZE=500
    depends_on:
      db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
      kafka-broker:
        condition: service_healthy
    networks:
      - iot_network

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8002:8002"
    environment:
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      - MQTT_QOS=${MQTT_QOS:-0}
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092
    depends_on:
      mqtt-broker:
        condition: service_started
      kafka-broker:
        condition: service_healthy
    networks:
      - iot_network

  # =====================================
  # MONITORING
  # =====================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - data-ingestion
      - data-storage
      - analytics-service
    networks:
      - iot_network

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./config/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./config/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./config/grafana/provisioning/dashboards/iot_comparison.json:/var/lib/grafana/dashboards/iot_comparison.json
    depends_on:
      - prometheus
    networks:
      - iot_network

networks:
  iot_network:
    name: iot_network

volumes:
  pgdata:
  mqttdata:
  mqttlogs: