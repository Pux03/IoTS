services:
  rest-service:
    build:
      context: ./rest_service
      dockerfile: Dockerfile
    container_name: iot-rest-service
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=iot-access-control-system-postgres;Database=access_control_system;Username=admin;Password=admin
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  grpc-service:
    build:
      context: ./grpc_service
      dockerfile: Dockerfile
    container_name: iot-grpc-service
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=iot-access-control-system-postgres;Database=access_control_system;Username=admin;Password=admin
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "50051:8080"
    depends_on:
      postgres:
        condition: service_healthy

  graphql-service:
    build: ./graphql_service
    container_name: iot-graphql-service
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=iot-access-control-system-postgres
      - DB_PORT=5432
      - DB_NAME=access_control_system
      - DB_USER=admin
      - DB_PASSWORD=admin

  benchmark-service:
    build:
      context: ./benchmark_service
      dockerfile: Dockerfile
    container_name: iot-benchmark-service
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - rest-service
      - grpc-service
      - graphql-service

  benchmark-frontend:
    build:
      context: ./benchmark_frontend
      dockerfile: Dockerfile
      args:
        VITE_BENCHMARK_API_URL: http://localhost:3000
    container_name: iot-benchmark-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - benchmark-service

  postgres:
    image: postgres:15
    container_name: iot-access-control-system-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: access_control_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d access_control_system"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
